apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: durable-flow-demo
        metrics_path: /q/metrics
        static_configs:
          - targets:
              - durable-flow-demo.default.svc.cluster.local:80
