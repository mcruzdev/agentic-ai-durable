apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-newsletter-drafter
  labels:
    app: grafana
data:
  newsletter-drafter-overview.json: |
    {
      "id": null,
      "uid": "newsletter-drafter-overview",
      "title": "Newsletter Drafter Overview",
      "tags": ["quarkus", "newsletter-drafter"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "Target Up",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "up{job=\"newsletter-drafter\"}",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "type": "timeseries",
          "title": "HTTP Server Requests per second",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count[1m]))",
              "refId": "A"
            }
          ],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        }
      ]
    }
